<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>///</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@1,200&display=swap');

  :root {
    --bg: #0a0a0a;
    --paper: #f5f0e8;
    --ink: #1a1a1a;
    --red: #8b1a1a;
    --gold: #b8922a;
    --dim: #3a3a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
    pointer-events: none;
    z-index: 99;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 98;
  }

  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  /* Floating symbols */
  .symbols {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .sym {
    position: absolute;
    color: var(--dim);
    font-size: 11px;
    opacity: 0;
    animation: floatSym 12s infinite linear;
    font-family: 'Share Tech Mono', monospace;
  }

  @keyframes floatSym {
    0%   { opacity: 0; transform: translateY(0px); }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.15; }
    100% { opacity: 0; transform: translateY(-80px); }
  }

  /* Top label */
  .label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--dim);
    text-transform: uppercase;
    animation: fadeIn 2s ease forwards;
    opacity: 0;
    animation-delay: 0.5s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Paper card */
  .card {
    position: relative;
    background: var(--paper);
    width: 380px;
    padding: 48px 44px 44px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.15),
      4px 4px 0 rgba(0,0,0,0.3),
      0 20px 60px rgba(0,0,0,0.8);
    transform: rotate(-0.8deg);
    animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  @keyframes cardReveal {
    0%   { opacity: 0; transform: rotate(-0.8deg) translateY(30px) scale(0.95); }
    100% { opacity: 1; transform: rotate(-0.8deg) translateY(0) scale(1); }
  }

  /* Paper texture lines */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(0,0,80,0.06) 27px,
      rgba(0,0,80,0.06) 28px
    );
    pointer-events: none;
  }

  /* Red margin line */
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 62px;
    bottom: 0;
    width: 1px;
    background: rgba(139, 26, 26, 0.25);
    pointer-events: none;
  }

  .card-inner {
    position: relative;
    z-index: 2;
    padding-left: 20px;
  }

  .card-title {
    font-family: 'Crimson Pro', Georgia, serif;
    font-style: italic;
    font-weight: 200;
    font-size: 13px;
    color: var(--red);
    letter-spacing: 0.15em;
    margin-bottom: 28px;
    opacity: 0.7;
  }

  .card-prompt {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    line-height: 1.9;
    margin-bottom: 32px;
    opacity: 0.75;
  }

  .card-prompt span {
    display: block;
  }

  /* Input area */
  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .input-wrap::before {
    content: '>';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    color: var(--red);
    font-size: 12px;
    opacity: 0.6;
  }

  input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(26,26,26,0.25);
    padding: 8px 8px 8px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    letter-spacing: 0.12em;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-bottom-color: var(--red);
  }

  input[type="text"]::placeholder {
    color: rgba(26,26,26,0.25);
    font-style: italic;
  }

  /* Submit button */
  .submit-btn {
    display: block;
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 11px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 28px;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0; bottom: 0;
    width: 100%;
    background: var(--red);
    transition: left 0.25s ease;
    z-index: 0;
  }

  .submit-btn:hover::before { left: 0; }
  .submit-btn span { position: relative; z-index: 1; }
  .submit-btn:active { transform: translateY(1px); }

  /* Error state */
  .error-msg {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--red);
    margin-top: 10px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    text-transform: uppercase;
  }

  .error-msg.show { opacity: 1; }

  /* Stamp */
  .stamp {
    position: absolute;
    top: 18px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(139,26,26,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: rgba(139,26,26,0.2);
    letter-spacing: 0.1em;
    transform: rotate(15deg);
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.2;
    text-align: center;
  }

  /* Success overlay */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  .success-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .success-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    animation: pulse 1.5s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Attempts counter */
  .attempts {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-align: right;
    opacity: 0.5;
    margin-top: 6px;
  }

  /* Corner fold */
  .fold {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 22px 22px;
    border-color: transparent transparent rgba(0,0,0,0.12) transparent;
  }

  .fold::after {
    content: '';
    position: absolute;
    bottom: -22px;
    right: -22px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 22px 22px 0 0;
    border-color: #d9d4c8 transparent transparent transparent;
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<!-- Floating background symbols -->
<div class="symbols" id="symbols"></div>

<div class="container">
  <div class="label">classified transmission</div>

  <div class="card">
    <div class="stamp">TOP<br>SECRET</div>
    <div class="card-inner">
      <div class="card-title">— entry verification —</div>
      <div class="card-prompt">
        <span>You have come far.</span>
        <span>Further than most.</span>
        <span>&nbsp;</span>
        <span>Prove you understand what</span>
        <span>governs all things in motion.</span>
      </div>
      <div class="input-wrap">
        <input type="text" id="passInput" placeholder="enter the word..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="error-msg" id="errorMsg">incorrect. think harder.</div>
      <div class="attempts" id="attemptsDisplay"></div>
      <button class="submit-btn" onclick="checkPassword()"><span>submit</span></button>
    </div>
    <div class="fold"></div>
  </div>

  <div class="label" style="animation-delay:1s; opacity:0;">▲ &nbsp; all attempts are logged &nbsp; ▲</div>
</div>

<!-- Success screen -->
<div class="success-overlay" id="successOverlay">
  <div class="success-text">access granted — redirecting...</div>
</div>

<script>
  // ══════════════════════════════════════════
  // CHANGE THIS to your black website's URL
  const SECRET_URL = "https://swobabobs.github.io/looktothedetectiveboard/";
  // ══════════════════════════════════════════

  const PASSWORD = "relativity";
  const LOCKOUT_DURATION = 60 * 60 * 1000; // 1 hour in ms
  const STORAGE_KEY = "gate_lockout_until";
  let attempts = 0;
  let countdownInterval = null;

  // Generate floating symbols
  const symChars = ['○','◆','▲','▼','✦','⊕','∴','∞','◇','△','▽','◉','⊗','∅'];
  const symContainer = document.getElementById('symbols');

  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sym';
    s.textContent = symChars[Math.floor(Math.random() * symChars.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = (20 + Math.random() * 70) + 'vh';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.animationDuration = (10 + Math.random() * 8) + 's';
    symContainer.appendChild(s);
  }

  // Check lockout on page load
  window.addEventListener('load', () => {
    const lockoutUntil = localStorage.getItem(STORAGE_KEY);
    if (lockoutUntil && Date.now() < parseInt(lockoutUntil)) {
      applyLockout(parseInt(lockoutUntil));
    }
  });

  function applyLockout(lockoutUntil) {
    const input_el = document.getElementById('passInput');
    const btn = document.querySelector('.submit-btn');
    const errorEl = document.getElementById('errorMsg');

    input_el.disabled = true;
    input_el.value = '';
    input_el.placeholder = 'access suspended...';
    btn.disabled = true;
    btn.style.opacity = '0.3';
    btn.style.cursor = 'not-allowed';

    // Clear any existing interval
    if (countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      const remaining = lockoutUntil - Date.now();
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        // Unlock
        input_el.disabled = false;
        input_el.placeholder = 'enter the word...';
        btn.disabled = false;
        btn.style.opacity = '';
        btn.style.cursor = '';
        errorEl.classList.remove('show');
        document.getElementById('attemptsDisplay').textContent = '';
        localStorage.removeItem(STORAGE_KEY);
      } else {
        const hrs  = Math.floor(remaining / 3600000);
        const mins = Math.floor((remaining % 3600000) / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        const pad  = n => String(n).padStart(2, '0');
        document.getElementById('attemptsDisplay').textContent =
          `locked — ${hrs > 0 ? pad(hrs) + ':' : ''}${pad(mins)}:${pad(secs)}`;
        errorEl.textContent = 'transmission blocked. wait.';
        errorEl.classList.add('show');
      }
    }, 1000);
  }

  // Enter key support
  document.getElementById('passInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    const input = document.getElementById('passInput').value.trim().toLowerCase();
    const errorEl = document.getElementById('errorMsg');
    const attemptsEl = document.getElementById('attemptsDisplay');

    if (input === PASSWORD) {
      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('active');
      setTimeout(() => {
        window.location.href = SECRET_URL;
      }, 2200);
    } else {
      attempts++;
      attemptsEl.textContent = `attempt ${attempts}`;
      errorEl.textContent = 'incorrect. think harder.';
      errorEl.classList.remove('show');
      void errorEl.offsetWidth;
      errorEl.classList.add('show');

      const input_el = document.getElementById('passInput');
      input_el.style.borderBottomColor = '#8b1a1a';
      setTimeout(() => { input_el.style.borderBottomColor = ''; }, 600);
      input_el.value = '';

      // Start lockout after first wrong answer
      const lockoutUntil = Date.now() + LOCKOUT_DURATION;
      localStorage.setItem(STORAGE_KEY, lockoutUntil.toString());
      applyLockout(lockoutUntil);
    }
  }
</script>
</body>
</html>
